<!DOCTYPE html>
<html>
<head>
  <title>HarambeeFlow Donate</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f2937;
      padding: 25px;
      border-radius: 10px;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>💰 Donate to HarambeeFlow</h2>

  <input id="phone" placeholder="2547XXXXXXXX">
  <input id="amount" placeholder="Amount (KES)">

  <button onclick="pay()">Pay Now</button>

  <p id="msg"></p>
</div>

<script>
async function pay() {

  const phone = document.getElementById("phone").value;
  const amount = document.getElementById("amount").value;
  const msg = document.getElementById("msg");

  msg.innerText = "Processing STK Push...";

  try {
    const res = await fetch("https://harambeeflow-backend.onrender.com/stkpush", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        phone,
        amount
      })
    });

    const data = await res.json();

    if (data.error) {
      msg.innerText = "Error: " + data.error;
    } else {
      msg.innerText = "✔ STK Push sent. Check your phone.";
    }

  } catch (err) {
    msg.innerText = "Request failed";
  }
}
</script>

</body>
</html>
