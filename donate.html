<!DOCTYPE html>
<html>
<head>
  <title>HarambeeFlow Donate</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f2937;
      padding: 25px;
      border-radius: 10px;
      width: 340px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border: none;
      background: #22c55e;
      color: black;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 12px;
      font-size: 14px;
      color: #cbd5e1;
      min-height: 20px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">

  <div class="title">💰 Donate to HarambeeFlow</div>

  <input id="name" placeholder="Your Name (optional)">
  <input id="phone" placeholder="2547XXXXXXXX">
  <input id="amount" placeholder="Amount (KES)">

  <button id="btn" onclick="pay()">Pay Now</button>

  <p id="msg"></p>
</div>

<script>
async function pay() {

  const name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  const amount = document.getElementById("amount").value.trim();

  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");

  // basic validation
  if (!phone || !amount) {
    msg.innerText = "❌ Phone and amount are required";
    return;
  }

  // normalize phone (basic safety)
  phone = phone.replace(/\D/g, "");

  msg.innerText = "📲 Sending STK Push...";
  btn.disabled = true;

  try {
    const res = await fetch("https://harambeeflow-backend.onrender.com/stkpush", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name || "Anonymous",
        phone,
        amount: Number(amount)
      })
    });

    const data = await res.json();

    if (data.error) {
      msg.innerText = "❌ " + data.error;
    } else {
      msg.innerText = "✔ STK Push sent. Check your phone to complete payment.";
    }

  } catch (err) {
    msg.innerText = "❌ Network error. Try again later.";
  }

  btn.disabled = false;
}
</script>

</body>
</html>
