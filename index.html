<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarambeeFlow Fintech V9.2 Stable Debug</title>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:20px;
  border-right:1px solid #1f2937;
}

.brand{font-size:18px;font-weight:bold;margin-bottom:20px;}
.brand span{color:#22c55e;}

.nav button{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#111827;
  border:1px solid #1f2937;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
.nav button:hover{background:#1f2937;}

.main{flex:1;padding:20px;}

.page{display:none;}
.page.active{display:block;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:10px;
  border:1px solid #1f2937;
}

.feed{
  margin-top:20px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  height:260px;
  overflow:auto;
  border:1px solid #1f2937;
  font-size:13px;
}

.loginBox{
  position:fixed;
  inset:0;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.loginCard{
  background:#111827;
  padding:20px;
  border-radius:10px;
  width:320px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#0f172a;
  border:1px solid #1f2937;
  color:white;
  border-radius:6px;
}

button.primary{
  width:100%;
  background:#22c55e;
  border:none;
  padding:10px;
  color:black;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="loginBox" id="loginBox">
  <div class="loginCard">
    <h3>Admin Login V9.2</h3>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button class="primary" onclick="login()">Login</button>
  </div>
</div>

<div class="sidebar">
  <div class="brand">Harambee<span>Flow V9.2</span></div>

  <div class="nav">
    <button onclick="showPage('dashboard')">📊 Dashboard</button>
    <button onclick="showPage('fundraisers')">🎯 Fundraisers</button>
    <button onclick="showPage('feed')">💰 Live Feed</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="main">

<div id="dashboard" class="page active">
  <h2>Dashboard</h2>

  <div class="cards">
    <div class="card"><h2 id="total">KES 0</h2><p>Total</p></div>
    <div class="card"><h2 id="completed">0</h2><p>Completed</p></div>
    <div class="card"><h2 id="pending">0</h2><p>Pending</p></div>
    <div class="card"><h2 id="failed">0</h2><p>Failed</p></div>
  </div>
</div>

<div id="fundraisers" class="page">
  <h2>Fundraisers</h2>
  <div id="fundraiserList" class="cards"></div>
</div>

<div id="feed" class="page">
  <h2>Live Feed</h2>
  <div class="feed" id="feedBox"></div>
</div>

</div>

<script>

/* SAFE REFERENCES */
const feedBox = document.getElementById("feedBox");
const fundraiserList = document.getElementById("fundraiserList");
const loginBox = document.getElementById("loginBox");

firebase.initializeApp({
  apiKey: "AIzaSyD6CTXy_YMZniq3CLBcdO_rEtRn1AOyySE",
  authDomain: "harambeeflow.firebaseapp.com",
  projectId: "harambeeflow"
});

const auth = firebase.auth();

let isLoggedIn = false;

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).catch(err=>alert("Login failed"));
}

/* LOGOUT */
function logout(){ auth.signOut(); }

/* AUTH */
auth.onAuthStateChanged(user=>{
  isLoggedIn = !!user;
  loginBox.style.display = user ? "none" : "flex";
  if(user) load();
});

/* NAV */
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* LOAD (STEP 1 + DEBUGGING) */
async function load(){

  try{

    console.log("LOAD START");

    const res = await fetch("https://harambeeflow-backend.onrender.com/realtime-donations");
    console.log("STATUS:", res.status);

    const donations = await res.json();
    console.log("DATA:", donations);

    if(!Array.isArray(donations)){
      console.error("Invalid API response");
      return;
    }

    let total=0,completed=0,pending=0,failed=0;

    donations.forEach(d=>{
      total += Number(d.amount || 0);

      if(d.status==="completed") completed++;
      else if(d.status==="pending") pending++;
      else failed++;
    });

    document.getElementById("total").innerText="KES "+total;
    document.getElementById("completed").innerText=completed;
    document.getElementById("pending").innerText=pending;
    document.getElementById("failed").innerText=failed;

    if(feedBox){
      feedBox.innerHTML="";
      donations.slice(0,20).forEach(d=>{
        const div=document.createElement("div");
        div.innerText=`💰 ${d.name||"Anon"} • ${d.amount} • ${d.status}`;
        feedBox.appendChild(div);
      });
    }

    console.log("LOAD END");

  }catch(err){
    console.error("LOAD FAILED",err);
  }
}

/* STEP 2 - SAFE INTERVAL (NO OVERLAP) */
let loading = false;

setInterval(async ()=>{
  if(!isLoggedIn || loading) return;

  loading = true;
  await load();
  loading = false;

}, 8000);

</script>

</body>
</html>
