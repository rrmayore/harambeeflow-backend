<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarambeeFlow Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:#111827;
  border-bottom:1px solid #1f2937;
}
.logo{
  font-weight:bold;
  font-size:18px;
}
.logo span{color:#22c55e}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  border:1px solid #1f2937;
}
.card h2{
  color:#22c55e;
  margin:0;
}

/* TABLE */
.table{
  padding:20px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#111827;
  border-radius:12px;
  overflow:hidden;
}
th,td{
  padding:12px;
  border-bottom:1px solid #1f2937;
  font-size:13px;
}
th{
  background:#0f172a;
  text-align:left;
  color:#22c55e;
}

.status{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
.completed{background:#14532d;color:#22c55e;}
.pending{background:#3b3b1f;color:#facc15;}
.failed{background:#3b1f1f;color:#f87171;}

/* LIVE DOT */
.live{
  width:8px;
  height:8px;
  background:#22c55e;
  border-radius:50%;
  display:inline-block;
  animation:pulse 1s infinite;
}
@keyframes pulse{
  0%{opacity:1}
  50%{opacity:0.3}
  100%{opacity:1}
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Harambee<span>Flow</span> Dashboard</div>
  <div><span class="live"></span> LIVE</div>
</div>

<!-- STATS -->
<div class="grid">
  <div class="card">
    <h2 id="total">KES 0</h2>
    <p>Total Donations</p>
  </div>

  <div class="card">
    <h2 id="completed">0</h2>
    <p>Completed</p>
  </div>

  <div class="card">
    <h2 id="pending">0</h2>
    <p>Pending</p>
  </div>

  <div class="card">
    <h2 id="failed">0</h2>
    <p>Failed</p>
  </div>
</div>

<!-- TABLE -->
<div class="table">
  <h3>Recent Transactions</h3>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>

async function load(){

  try{

    const res = await fetch("https://harambeeflow-backend.onrender.com/stats");
    const data = await res.json();

    document.getElementById("total").innerText = "KES " + data.total;
    document.getElementById("completed").innerText = data.completed;
    document.getElementById("pending").innerText = data.pending;
    document.getElementById("failed").innerText = data.failed;

    const rows = document.getElementById("rows");
    rows.innerHTML = "";

    const latest = data.donations.slice(-15).reverse();

    latest.forEach(d => {

      const tr = document.createElement("tr");

      const statusClass =
        d.status === "completed" ? "completed" :
        d.status === "pending" ? "pending" : "failed";

      const time = d.createdAt?.seconds
        ? new Date(d.createdAt.seconds * 1000).toLocaleString()
        : "N/A";

      tr.innerHTML = `
        <td>${d.name || "Anonymous"}</td>
        <td>${d.phone}</td>
        <td>KES ${d.amount}</td>
        <td><span class="status ${statusClass}">${d.status}</span></td>
        <td>${time}</td>
      `;

      rows.appendChild(tr);
    });

  } catch(err){
    console.log(err);
  }
}

load();
setInterval(load, 5000);

</script>

</body>
</html>
