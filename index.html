<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarambeeFlow Fintech v4</title>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:20px;
  border-right:1px solid #1f2937;
}

.brand{
  font-size:18px;
  font-weight:bold;
  margin-bottom:20px;
}

.brand span{color:#22c55e;}

.nav button{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#111827;
  border:1px solid #1f2937;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.nav button:hover{background:#1f2937;}

.main{flex:1;padding:20px;}

.page{display:none;}
.page.active{display:block;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:10px;
  border:1px solid #1f2937;
}

.card h2{color:#22c55e;margin:0;}

.feed{
  margin-top:20px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  height:260px;
  overflow:auto;
  border:1px solid #1f2937;
  font-size:13px;
}

/* LOGIN */
.loginBox{
  position:fixed;
  inset:0;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.loginCard{
  background:#111827;
  padding:20px;
  border-radius:10px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#0f172a;
  border:1px solid #1f2937;
  color:white;
  border-radius:6px;
}

button.primary{
  width:100%;
  background:#22c55e;
  border:none;
  padding:10px;
  color:black;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

canvas{
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="loginBox" id="loginBox">
  <div class="loginCard">
    <h3>Admin Login v4</h3>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button class="primary" onclick="login()">Login</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">Harambee<span>Flow v4</span></div>

  <div class="nav">
    <button onclick="showPage('dashboard')">📊 Dashboard</button>
    <button onclick="showPage('analytics')">📈 Analytics</button>
    <button onclick="showPage('feed')">💰 Live Feed</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">

  <h2>Dashboard</h2>

  <div class="cards">
    <div class="card"><h2 id="total">KES 0</h2><p>Total</p></div>
    <div class="card"><h2 id="completed">0</h2><p>Completed</p></div>
    <div class="card"><h2 id="pending">0</h2><p>Pending</p></div>
    <div class="card"><h2 id="failed">0</h2><p>Failed</p></div>
  </div>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="page">

  <h2>Revenue Analytics</h2>
  <canvas id="chart" height="120"></canvas>

</div>

<!-- FEED -->
<div id="feed" class="page">

  <h2>Live Feed</h2>
  <div class="feed" id="feedBox"></div>

</div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD6CTXy_YMZniq3CLBcdO_rEtRn1AOyySE",
  authDomain: "harambeeflow.firebaseapp.com",
  projectId: "harambeeflow",
  storageBucket: "harambeeflow.firebasestorage.app",
  messagingSenderId: "991042439020",
  appId: "1:991042439020:web:f31c474633b26c52121549"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let chart;

/* LOGIN */
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await auth.signInWithEmailAndPassword(email, password);
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("loginBox").style.display = "none";
    load();
  }else{
    document.getElementById("loginBox").style.display = "flex";
  }
});

/* NAV */
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* LOAD DATA */
async function load(){

  const res = await fetch("https://harambeeflow-backend.onrender.com/stats");
  const data = await res.json();

  document.getElementById("total").innerText = "KES " + data.total;
  document.getElementById("completed").innerText = data.completed;
  document.getElementById("pending").innerText = data.pending;
  document.getElementById("failed").innerText = data.failed;

  /* FEED */
  const feedBox = document.getElementById("feedBox");
  feedBox.innerHTML = "";

  data.donations.slice(-15).reverse().forEach(d=>{
    const div = document.createElement("div");
    div.innerText = `💰 ${d.name} • ${d.phone} • KES ${d.amount} (${d.status})`;
    feedBox.appendChild(div);
  });

  /* CHART */
  const totals = data.donations.slice(-10).map(d=>Number(d.amount || 0));

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: totals.map((_,i)=>"Tx " + (i+1)),
      datasets: [{
        label: "Revenue",
        data: totals,
        borderColor: "#22c55e",
        backgroundColor: "rgba(34,197,94,0.2)"
      }]
    }
  });
}

setInterval(load, 5000);

</script>

</body>
</html>
