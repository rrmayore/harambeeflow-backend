<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarambeeFlow AI Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:220px;
  height:100%;
  background:#111827;
  padding:20px;
  border-right:1px solid #1f2937;
}

.sidebar h2{
  color:#22c55e;
}

.nav button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#0b1220;
  border:1px solid #1f2937;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

.nav button:hover{
  background:#22c55e;
  color:black;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  border:1px solid #1f2937;
}

h1,h2{
  color:#22c55e;
}

/* PAGES */
.page{
  display:none;
}

.page.active{
  display:block;
}

.feed{
  background:#0b1220;
  padding:10px;
  border-radius:10px;
  height:300px;
  overflow:auto;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>HarambeeFlow</h2>
  <div class="nav">
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('donations')">Donations</button>
    <button onclick="showPage('analytics')">Analytics</button>
    <button onclick="showPage('settings')">Settings</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page active">
    <h1>Dashboard</h1>

    <div class="grid">
      <div class="card"><h2 id="total">KES 0</h2><p>Total</p></div>
      <div class="card"><h2 id="completed">0</h2><p>Completed</p></div>
      <div class="card"><h2 id="pending">0</h2><p>Pending</p></div>
      <div class="card"><h2 id="failed">0</h2><p>Failed</p></div>
    </div>

    <h3>Live Feed</h3>
    <div class="feed" id="feed"></div>
  </div>

  <!-- DONATIONS PAGE -->
  <div id="donations" class="page">
    <h1>Donations</h1>
    <div id="donationList" class="feed"></div>
  </div>

  <!-- ANALYTICS -->
  <div id="analytics" class="page">
    <h1>Analytics</h1>
    <div class="card">
      <p>Coming soon: charts, trends, donor behavior</p>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settings" class="page">
    <h1>Settings</h1>
    <div class="card">
      <p>Backend: Connected</p>
      <p>API: Active</p>
    </div>
  </div>

</div>

<script>

/* PAGE SWITCHER */
function showPage(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* LOAD DATA */
async function load(){
  try{
    const res = await fetch("https://harambeeflow-backend.onrender.com/stats");
    const data = await res.json();

    document.getElementById("total").innerText = "KES " + data.total;
    document.getElementById("completed").innerText = data.completed;
    document.getElementById("pending").innerText = data.pending;
    document.getElementById("failed").innerText = data.failed;

    const feed = document.getElementById("feed");
    const list = document.getElementById("donationList");

    feed.innerHTML = "";
    list.innerHTML = "";

    data.donations.slice(-15).reverse().forEach(d => {

      const text = `💰 ${d.name || "Anonymous"} • ${d.phone} • KES ${d.amount} (${d.status})`;

      const div1 = document.createElement("div");
      div1.innerText = text;
      feed.appendChild(div1);

      const div2 = document.createElement("div");
      div2.innerText = text;
      list.appendChild(div2);

    });

  } catch(e){
    console.log(e);
  }
}

load();
setInterval(load, 5000);

</script>

</body>
</html>
