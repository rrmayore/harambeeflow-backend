<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarambeeFlow Fintech V8 Enterprise</title>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:20px;
  border-right:1px solid #1f2937;
}

.brand{
  font-size:18px;
  font-weight:bold;
  margin-bottom:20px;
}
.brand span{color:#22c55e;}

.nav button{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#111827;
  border:1px solid #1f2937;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
.nav button:hover{background:#1f2937;}

.main{flex:1;padding:20px;}

.page{display:none;}
.page.active{display:block;}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}
.card{
  background:#111827;
  padding:15px;
  border-radius:10px;
  border:1px solid #1f2937;
}

/* FEED */
.feed{
  margin-top:20px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  height:260px;
  overflow:auto;
  border:1px solid #1f2937;
  font-size:13px;
}

/* LOGIN */
.loginBox{
  position:fixed;
  inset:0;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
.loginCard{
  background:#111827;
  padding:20px;
  border-radius:10px;
  width:320px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#0f172a;
  border:1px solid #1f2937;
  color:white;
  border-radius:6px;
}

button.primary{
  width:100%;
  background:#22c55e;
  border:none;
  padding:10px;
  color:black;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:999;
}
.modalContent{
  width:420px;
  background:#111827;
  padding:20px;
  border-radius:12px;
  border:1px solid #1f2937;
}

canvas{
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:10px;
}

.loading{
  text-align:center;
  margin-top:10px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="loginBox" id="loginBox">
  <div class="loginCard">
    <h3>Admin Login V8</h3>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button class="primary" onclick="login()">Login</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="fundraiserModal">
  <div class="modalContent">
    <h3>🎯 Start Fundraiser</h3>

    <input id="fTitle" placeholder="Fundraiser Title"/>
    <textarea id="fDesc" placeholder="Description"></textarea>
    <input id="fGoal" type="number" placeholder="Goal Amount (KES)"/>

    <button class="primary" onclick="createFundraiser()">Create</button>
    <button onclick="closeModal()" style="margin-top:10px;width:100%;background:#1f2937;color:white;border:none;padding:10px;border-radius:6px;">
      Cancel
    </button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">Harambee<span>Flow V8</span></div>

  <div class="nav">
    <button onclick="showPage('dashboard')">📊 Dashboard</button>
    <button onclick="showPage('fundraisers')">🎯 Fundraisers</button>
    <button onclick="showPage('analytics')">📈 Analytics</button>
    <button onclick="showPage('feed')">💰 Live Feed</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <h2>Dashboard</h2>
  <div class="loading" id="loading">Loading live data...</div>

  <div class="cards">
    <div class="card"><h2 id="total">KES 0</h2><p>Total</p></div>
    <div class="card"><h2 id="completed">0</h2><p>Completed</p></div>
    <div class="card"><h2 id="pending">0</h2><p>Pending</p></div>
    <div class="card"><h2 id="failed">0</h2><p>Failed</p></div>
  </div>
</div>

<!-- FUNDRAISERS -->
<div id="fundraisers" class="page">
  <h2>🎯 Fundraisers</h2>

  <button class="primary" onclick="openModal()">➕ Start New Fundraiser</button>

  <br><br>

  <div id="fundraiserList" class="cards"></div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="page">
  <h2>Revenue Analytics (V8)</h2>
  <canvas id="chart" height="120"></canvas>
</div>

<!-- FEED -->
<div id="feed" class="page">
  <h2>Live Feed (Realtime)</h2>
  <div class="feed" id="feedBox"></div>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD6CTXy_YMZniq3CLBcdO_rEtRn1AOyySE",
  authDomain: "harambeeflow.firebaseapp.com",
  projectId: "harambeeflow",
  storageBucket: "harambeeflow.firebasestorage.app",
  messagingSenderId: "991042439020",
  appId: "1:991042439020:web:f31c474633b26c52121549"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let chart;
let isLoggedIn = false;

/* AUTH */
auth.onAuthStateChanged(user=>{
  isLoggedIn = !!user;
  document.getElementById("loginBox").style.display = user ? "none" : "flex";
  if(user) load();
});

/* LOGIN */
async function login(){
  try{
    await auth.signInWithEmailAndPassword(
      document.getElementById("email").value,
      document.getElementById("password").value
    );
  }catch(err){
    alert("Login failed");
  }
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* NAV */
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  if(page === "fundraisers"){
    loadFundraisers();
  }
}

/* MODAL */
function openModal(){ document.getElementById("fundraiserModal").style.display="flex"; }
function closeModal(){ document.getElementById("fundraiserModal").style.display="none"; }

/* CREATE FUNDRAISER */
async function createFundraiser(){

  const data = {
    title: fTitle.value,
    description: fDesc.value,
    goal: fGoal.value
  };

  try{
    await fetch("https://harambeeflow-backend.onrender.com/fundraiser", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    closeModal();
    fTitle.value = "";
    fDesc.value = "";
    fGoal.value = "";

    loadFundraisers();

  }catch(err){
    console.log(err);
  }
}

/* LOAD FUNDRAISERS */
async function loadFundraisers(){

  try{
    const res = await fetch("https://harambeeflow-backend.onrender.com/fundraisers");
    const data = await res.json();

    const container = document.getElementById("fundraiserList");
    container.innerHTML = "";

    if(data.length === 0){
      container.innerHTML = "<p>No fundraisers yet. Start one.</p>";
      return;
    }

    data.forEach(f=>{
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${f.title}</h3>
        <p>${f.description || ""}</p>
        <p><b>KES ${f.raised || 0}</b> / KES ${f.goal || 0}</p>
      `;
      container.appendChild(div);
    });

  }catch(err){
    console.log("Fundraiser load error", err);
  }
}

/* LOAD DASHBOARD */
async function load(){

  if(!isLoggedIn) return;

  try{

    const res = await fetch("https://harambeeflow-backend.onrender.com/realtime-donations");
    const donations = await res.json();

    let total=0,completed=0,pending=0,failed=0;

    donations.forEach(d=>{
      total += Number(d.amount||0);
      d.status==="completed"?completed++:d.status==="pending"?pending++:failed++;
    });

    totalEl.innerText="KES "+total;
    completedEl.innerText=completed;
    pendingEl.innerText=pending;
    failedEl.innerText=failed;

    feedBox.innerHTML="";
    donations.slice(0,20).forEach(d=>{
      const div=document.createElement("div");
      div.innerText=`💰 ${d.name||"Anon"} • ${d.amount} • ${d.status}`;
      feedBox.appendChild(div);
    });

  }catch(err){
    console.log(err);
  }
}

setInterval(load,5000);

</script>

</body>
</html>
