<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarambeeFlow AI</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
  background:#0b1220;
  border-bottom:1px solid #1f2937;
}

.logo{
  font-size:20px;
  font-weight:bold;
}
.logo span{color:#22c55e;}

/* HERO */
.hero{
  text-align:center;
  padding:30px 15px;
}
.hero h1{font-size:32px;}
.hero p{color:#94a3b8;}

/* STATS GRID */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  padding:20px;
}

.card{
  background: rgba(17,24,39,0.8);
  border:1px solid #1f2937;
  padding:18px;
  border-radius:14px;
  text-align:center;
  backdrop-filter: blur(8px);
}

.card h2{margin:5px 0;}
.total{color:#22c55e;}
.ok{color:#10b981;}
.pending{color:#facc15;}
.failed{color:#ef4444;}

/* FEED */
.feed{
  padding:20px;
}

.feed-box{
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:12px;
  height:300px;
  overflow:auto;
}

/* ITEM */
.item{
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

.badge{
  padding:3px 8px;
  border-radius:6px;
  font-size:11px;
}

.completed{background:#065f46;color:#34d399;}
.pendingB{background:#92400e;color:#fbbf24;}
.failedB{background:#7f1d1d;color:#f87171;}

.footer{
  text-align:center;
  padding:20px;
  color:#64748b;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Harambee<span>Flow AI</span></div>
</div>

<div class="hero">
  <h1>Live M-PESA Fundraising</h1>
  <p>Real-time donations and transparent tracking system</p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="card"><h2 class="total" id="total">KES 0</h2><p>Total Raised</p></div>
  <div class="card"><h2 class="ok" id="completed">0</h2><p>Completed</p></div>
  <div class="card"><h2 class="pending" id="pending">0</h2><p>Pending</p></div>
  <div class="card"><h2 class="failed" id="failed">0</h2><p>Failed</p></div>
</div>

<!-- FEED -->
<div class="feed">
  <h3>Live Feed</h3>
  <div class="feed-box" id="feed"></div>
</div>

<div class="footer">
  © 2026 HarambeeFlow AI
</div>

<script>

async function load(){

  try{

    const res = await fetch("https://harambeeflow-backend.onrender.com/stats");
    const data = await res.json();

    document.getElementById("total").innerText = "KES " + data.total;
    document.getElementById("completed").innerText = data.completed;
    document.getElementById("pending").innerText = data.pending;
    document.getElementById("failed").innerText = data.failed;

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    const recent = data.donations.slice(-12).reverse();

    recent.forEach(d => {

      let statusClass = "pendingB";
      if(d.status === "completed") statusClass = "completed";
      if(d.status === "failed") statusClass = "failedB";

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          💰 ${d.name || "Anonymous"} • ${d.phone || "N/A"}<br/>
          <small>KES ${d.amount}</small>
        </div>
        <div class="badge ${statusClass}">
          ${d.status}
        </div>
      `;

      feed.appendChild(div);
    });

  } catch(err){
    console.log(err);
  }
}

load();
setInterval(load, 5000);

</script>

</body>
</html>
