<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarambeeFlow Fintech V9.5 Stable</title>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;display:flex;}

.sidebar{width:220px;background:#0f172a;height:100vh;padding:20px;border-right:1px solid #1f2937;}
.brand{font-size:18px;font-weight:bold;margin-bottom:20px;}
.brand span{color:#22c55e;}

.nav button{
width:100%;padding:10px;margin:6px 0;background:#111827;
border:1px solid #1f2937;color:white;border-radius:8px;cursor:pointer;
}
.nav button:hover{background:#1f2937;}

.main{flex:1;padding:20px;}

.page{display:none;}
.page.active{display:block;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.card{
background:#111827;padding:15px;border-radius:10px;border:1px solid #1f2937;
}

.feed{
margin-top:20px;background:#0f172a;padding:10px;border-radius:10px;
height:260px;overflow:auto;border:1px solid #1f2937;font-size:13px;
}

.loginBox{
position:fixed;inset:0;background:#0b1220;display:flex;
justify-content:center;align-items:center;z-index:10;
}

.loginCard{
background:#111827;padding:20px;border-radius:10px;width:320px;
}

input, textarea{
width:100%;padding:10px;margin:8px 0;background:#0f172a;
border:1px solid #1f2937;color:white;border-radius:6px;
}

button.primary{
width:100%;background:#22c55e;border:none;padding:10px;
color:black;font-weight:bold;border-radius:6px;cursor:pointer;
}

canvas{
background:#0f172a;border:1px solid #1f2937;border-radius:10px;padding:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:9999;
}

.modalContent{
width:420px;
background:#111827;
padding:20px;
border-radius:12px;
border:1px solid #1f2937;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="loginBox" id="loginBox">
  <div class="loginCard">
    <h3>Admin Login V9.5</h3>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button class="primary" onclick="login()">Login</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="fundraiserModal">
  <div class="modalContent">

    <h2>Start New Harambee Fundraiser Drive</h2>

    <input id="fTitle" placeholder="FUNDRAISER NAME">
    <input id="fGoal" type="number" placeholder="TARGET GOAL AMOUNT (KES)">
    <textarea id="fDesc" placeholder="BRIEF DESCRIPTION"></textarea>

    <input id="fSector" placeholder="SECTOR (Church/Community/School)">
    <input id="fPaybill" placeholder="M-PESA PAYBILL/TILL">
    <input id="fRef" placeholder="ACCOUNT REFERENCE CODE">
    <input id="fPhone" placeholder="TREASURER PHONE (2547...)">

    <div style="display:flex;gap:10px;margin-top:15px;">
      <button onclick="closeModal()" style="flex:1;background:#1f2937;color:white;padding:10px;border:none;border-radius:6px;">
        Cancel
      </button>

      <button onclick="createFundraiser()" style="flex:1;background:#22c55e;color:black;padding:10px;border:none;border-radius:6px;font-weight:bold;">
        Start Fundraiser
      </button>
    </div>

  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">Harambee<span>Flow V9.5</span></div>

  <div class="nav">
    <button onclick="showPage('dashboard')">📊 Dashboard</button>
    <button onclick="showPage('fundraisers')">🎯 Fundraisers</button>
    <button onclick="openModal()" style="background:#22c55e;color:black;">
      ➕ Start New Fundraiser
    </button>
    <button onclick="showPage('analytics')">📈 Analytics</button>
    <button onclick="showPage('feed')">💰 Live Feed</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <h2>Dashboard</h2>

  <div class="cards">
    <div class="card"><h2 id="total">KES 0</h2><p>Total</p></div>
    <div class="card"><h2 id="completed">0</h2><p>Completed</p></div>
    <div class="card"><h2 id="pending">0</h2><p>Pending</p></div>
    <div class="card"><h2 id="failed">0</h2><p>Failed</p></div>
  </div>
</div>

<!-- FUNDRAISERS -->
<div id="fundraisers" class="page">
  <h2>🎯 Fundraisers</h2>
  <div id="fundraiserList" class="cards"></div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="page">
  <h2>📈 Analytics</h2>
  <canvas id="chart"></canvas>
</div>

<!-- FEED -->
<div id="feed" class="page">
  <h2>💰 Live Feed</h2>
  <div class="feed" id="feedBox"></div>
</div>

</div>

<script>

const feedBox = document.getElementById("feedBox");
const fundraiserList = document.getElementById("fundraiserList");
const loginBox = document.getElementById("loginBox");

let chart;
let isLoggedIn = false;

firebase.initializeApp({
  apiKey:"AIzaSyD6CTXy_YMZniq3CLBcdO_rEtRn1AOyySE",
  authDomain:"harambeeflow.firebaseapp.com",
  projectId:"harambeeflow"
});

const auth = firebase.auth();

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  );
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* MODAL CONTROLS */
function openModal(){
  document.getElementById("fundraiserModal").style.display="flex";
}
function closeModal(){
  document.getElementById("fundraiserModal").style.display="none";
}

/* AUTH */
auth.onAuthStateChanged(user=>{
  isLoggedIn = !!user;
  loginBox.style.display = user ? "none" : "flex";
  if(user) load();
});

/* NAV */
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  if(page === "fundraisers") loadFundraisers();
  if(page === "analytics") loadChart();
}

/* CREATE FUNDRAISER */
async function createFundraiser(){

  const data = {
    title: document.getElementById("fTitle").value,
    goal: Number(document.getElementById("fGoal").value || 0),
    description: document.getElementById("fDesc").value,
    sector: document.getElementById("fSector").value,
    paybill: document.getElementById("fPaybill").value,
    reference: document.getElementById("fRef").value,
    phone: document.getElementById("fPhone").value,
    raised: 0
  };

  try{
    await fetch("https://harambeeflow-backend.onrender.com/fundraiser", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    closeModal();
    loadFundraisers();

  }catch(e){
    alert("Failed to create fundraiser");
    console.log(e);
  }
}

/* DASHBOARD */
async function load(){
  try{
    const res = await fetch("https://harambeeflow-backend.onrender.com/realtime-donations");
    const donations = await res.json().catch(()=>[]);

    let total=0,completed=0,pending=0,failed=0;

    (donations || []).forEach(d=>{
      total += Number(d?.amount || 0);

      if(d?.status === "completed") completed++;
      else if(d?.status === "pending") pending++;
      else failed++;
    });

    document.getElementById("total").innerText = "KES " + total;
    document.getElementById("completed").innerText = completed;
    document.getElementById("pending").innerText = pending;
    document.getElementById("failed").innerText = failed;

    feedBox.innerHTML = "";
    (donations || []).slice(0,20).forEach(d=>{
      const div = document.createElement("div");
      div.innerText = `💰 ${d?.name || "Anon"} • ${Number(d?.amount||0)} • ${d?.status}`;
      feedBox.appendChild(div);
    });

  }catch(e){
    console.log(e);
  }
}

/* FUNDRAISERS */
async function loadFundraisers(){
  try{
    const res = await fetch("https://harambeeflow-backend.onrender.com/fundraisers");
    const data = await res.json().catch(()=>[]);

    fundraiserList.innerHTML = "";

    if(!Array.isArray(data) || data.length === 0){
      fundraiserList.innerHTML = "<p>No fundraisers yet</p>";
      return;
    }

    data.forEach(f=>{
      const raised = Number(f?.raised || 0);
      const goal = Number(f?.goal || 1);
      const percent = Math.min(100, Math.round((raised/goal)*100));

      const div = document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <h3>${f?.title || "Untitled"}</h3>
        <p>${f?.description || ""}</p>
        <p>KES ${raised} / ${goal}</p>

        <div style="background:#1f2937;height:8px;border-radius:5px;">
          <div style="width:${percent}%;background:#22c55e;height:8px;"></div>
        </div>

        <small>${percent}% funded</small>
      `;

      fundraiserList.appendChild(div);
    });

  }catch(e){
    console.log(e);
  }
}

/* CHART */
async function loadChart(){
  try{
    const res = await fetch("https://harambeeflow-backend.onrender.com/realtime-donations");
    const donations = await res.json().catch(()=>[]);

    const data = (donations||[]).slice(0,10).map(d=>Number(d?.amount||0));

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
      type:"line",
      data:{
        labels:data.map((_,i)=>"Tx "+(i+1)),
        datasets:[{
          label:"Revenue",
          data:data,
          borderColor:"#22c55e",
          fill:false
        }]
      }
    });

  }catch(e){
    console.log(e);
  }
}

setInterval(()=>{ if(isLoggedIn) load(); },5000);

</script>

</body>
</html>
