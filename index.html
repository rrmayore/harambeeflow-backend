<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>HarambeeFlow AI</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header{
  background:#111827;
  padding:18px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2937;
}

.logo{
  font-size:20px;
  font-weight:bold;
}
.logo span{color:#22c55e;}

/* INSTALL BUTTON */
#installBtn{
  display:none;
  background:#22c55e;
  color:black;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero{
  padding:50px 20px 20px;
  text-align:center;
}

.hero h1{font-size:40px;margin-bottom:10px;}
.hero p{color:#cbd5e1;max-width:700px;margin:auto;}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  padding:20px;
}

.stat{
  background:#111827;
  padding:18px;
  border-radius:12px;
  text-align:center;
  border:1px solid #1f2937;
}

.stat h2{color:#22c55e;}

/* FEED */
.feed{
  padding:20px;
}

.feed-box{
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:12px;
  height:160px;
  overflow:auto;
  font-size:13px;
  color:#cbd5e1;
}

/* NOTIFICATIONS */
#notifContainer{
  position:fixed;
  top:15px;
  right:15px;
  z-index:9999;
}

.notif{
  background:#111827;
  border-left:4px solid #22c55e;
  padding:12px 14px;
  margin-bottom:10px;
  width:260px;
  font-size:13px;
  border-radius:8px;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(-10px);}
  to{opacity:1;transform:translateY(0);}
}

.footer{
  text-align:center;
  padding:20px;
  color:#94a3b8;
  font-size:12px;
}

</style>
</head>

<body>

<!-- NOTIFICATIONS -->
<div id="notifContainer"></div>

<!-- HEADER -->
<div class="header">
  <div class="logo">Harambee<span>Flow AI</span></div>

  <!-- PWA INSTALL BUTTON -->
  <button id="installBtn">⬇ Install App</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Live M-PESA Fundraising System</h1>
  <p>Real-time donations, instant updates, and transparent tracking for communities.</p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><h2 id="total">KES 0</h2><p>Total</p></div>
  <div class="stat"><h2 id="completed">0</h2><p>Completed</p></div>
  <div class="stat"><h2 id="pending">0</h2><p>Pending</p></div>
  <div class="stat"><h2 id="failed">0</h2><p>Failed</p></div>
</div>

<!-- FEED -->
<div class="feed">
  <h3 style="color:#22c55e">Live Feed</h3>
  <div class="feed-box" id="feed"></div>
</div>

<div class="footer">
  © 2026 HarambeeFlow AI
</div>

<!-- 🔥 SERVICE WORKER REGISTRATION -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

<!-- 🔥 PWA INSTALL LOGIC -->
<script>
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.getElementById("installBtn");
  btn.style.display = "block";

  btn.onclick = async () => {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    btn.style.display = "none";
  };
});
</script>

<!-- 🔥 APP LOGIC -->
<script>

let lastCount = 0;

function notify(msg){
  const box = document.getElementById("notifContainer");

  const div = document.createElement("div");
  div.className = "notif";
  div.innerText = msg;

  box.appendChild(div);

  setTimeout(() => div.remove(), 4000);
}

async function load(){

  try{

    const res = await fetch("https://harambeeflow-backend.onrender.com/stats");
    const data = await res.json();

    document.getElementById("total").innerText = "KES " + data.total;
    document.getElementById("completed").innerText = data.completed;
    document.getElementById("pending").innerText = data.pending;
    document.getElementById("failed").innerText = data.failed;

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    const recent = data.donations.slice(-10).reverse();

    recent.forEach(d => {
      const item = document.createElement("div");
      item.innerText = `💰 ${d.name || "Anonymous"} • ${d.phone} paid KES ${d.amount} (${d.status})`;
      feed.appendChild(item);
    });

    // 🔔 NEW DONATION ALERT
    if(data.donations.length > lastCount){
      const latest = data.donations[data.donations.length - 1];
      notify(`💰 New Donation: ${latest.name || "Anonymous"} donated KES ${latest.amount}`);
      lastCount = data.donations.length;
    }

  } catch(err){
    console.log("Dashboard error:", err);
  }
}

load();
setInterval(load, 5000);

</script>

</body>
</html>
