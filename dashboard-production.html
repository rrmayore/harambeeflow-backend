<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HarambeeFlow Admin</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.header {
  padding: 20px;
  background: #111827;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 { margin: 0; font-size: 20px; }

button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.logout {
  background: red;
  color: white;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.card h2 { margin: 0; font-size: 18px; }

.card p {
  font-size: 22px;
  margin: 10px 0 0;
}

.table-container { padding: 20px; }

table {
  width: 100%;
  border-collapse: collapse;
  background: #111827;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #1f2937;
  text-align: left;
}

th { background: #1f2937; }

.status {
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
}

.completed { background: green; }
.pending { background: orange; }
.failed { background: red; }

/* 🔔 TOAST */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #16a34a;
  color: white;
  padding: 12px 16px;
  border-radius: 8px;
  z-index: 9999;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyD6CTXy_YMZniq3CLBcdO_rEtRn1AOyySE",
  authDomain: "harambeeflow.firebaseapp.com",
  projectId: "harambeeflow",
  storageBucket: "harambeeflow.firebasestorage.app",
  messagingSenderId: "991042439020",
  appId: "1:991042439020:web:f31c474633b26c52121549",
  measurementId: "G-X131DGXWVJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@harambeeflow.com";

/* 🔔 STATE TRACKING */
let seen = new Map(); // id → status

function showToast(msg) {
  const div = document.createElement("div");
  div.className = "toast";
  div.innerText = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3500);
}

/* AUTH */
onAuthStateChanged(auth, async (user) => {
  if (!user) return (window.location.href = "login.html");

  if (user.email !== ADMIN_EMAIL) {
    alert("Access denied");
    await signOut(auth);
    return (window.location.href = "login.html");
  }

  startRealtime();
});

window.logout = async () => {
  await signOut(auth);
  window.location.href = "login.html";
};

/* REAL-TIME ENGINE */
function startRealtime() {

  const ref = collection(db, "donations");

  onSnapshot(ref, (snapshot) => {

    let total = 0, completed = 0, pending = 0, failed = 0;

    const table = document.getElementById("table");
    table.innerHTML = "";

    const rows = [];

    snapshot.forEach(doc => {
      const d = doc.data();

      const prevStatus = seen.get(doc.id);
      seen.set(doc.id, d.status);

      total += Number(d.amount || 0);

      if (d.status === "completed") completed++;
      else if (d.status === "pending") pending++;
      else failed++;

      /* 🔔 NEW DONATION */
      if (!prevStatus) {
        showToast(`💰 New Donation: KES ${d.amount} from ${d.phone}`);
      }

      /* 🔔 STATUS CHANGE */
      if (prevStatus && prevStatus !== d.status) {
        showToast(`🔄 Donation ${doc.id} → ${d.status}`);
      }

      rows.push(d);
    });

    /* latest first */
    rows.reverse();

    rows.forEach(d => {
      table.innerHTML += `
        <tr>
          <td>${d.phone || ""}</td>
          <td>${d.amount || 0}</td>
          <td><span class="status ${d.status}">${d.status}</span></td>
          <td>${d.checkoutRequestID || ""}</td>
          <td>${
            d.createdAt?.seconds
              ? new Date(d.createdAt.seconds * 1000).toLocaleString()
              : ""
          }</td>
        </tr>
      `;
    });

    document.getElementById("total").innerText = "KES " + total;
    document.getElementById("completed").innerText = completed;
    document.getElementById("pending").innerText = pending;
    document.getElementById("failed").innerText = failed;

  });
}
</script>

</head>

<body>

<div class="header">
  <h1>💰 HarambeeFlow Admin Dashboard</h1>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="stats">
  <div class="card"><h2>Total</h2><p id="total">0</p></div>
  <div class="card"><h2>Completed</h2><p id="completed">0</p></div>
  <div class="card"><h2>Pending</h2><p id="pending">0</p></div>
  <div class="card"><h2>Failed</h2><p id="failed">0</p></div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Phone</th>
<th>Amount</th>
<th>Status</th>
<th>Checkout ID</th>
<th>Time</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</body>
</html>
