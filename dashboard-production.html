<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HarambeeFlow Admin</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
  background: #111827;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 10px;
}

/* TABLE */
.table-container {
  padding: 20px;
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #111827;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #1f2937;
  font-size: 13px;
}

/* FEED */
.feed {
  width: 320px;
  background: #0b1220;
  border-left: 1px solid #1f2937;
  height: calc(100vh - 160px);
  overflow-y: auto;
  padding: 15px;
}

.msg {
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  border: 1px solid #1f2937;
}

/* STATUS */
.status {
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
}
.completed { background: green; }
.pending { background: orange; }
.failed { background: red; }

/* TOAST */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #16a34a;
  color: white;
  padding: 12px;
  border-radius: 8px;
  z-index: 9999;
}
</style>

</head>

<body>

<div class="header">
  <h1>💰 HarambeeFlow Admin Dashboard</h1>
  <button onclick="logout()">Logout</button>
</div>

<div class="stats">
  <div class="card"><h2>Total</h2><p id="total">0</p></div>
  <div class="card"><h2>Completed</h2><p id="completed">0</p></div>
  <div class="card"><h2>Pending</h2><p id="pending">0</p></div>
  <div class="card"><h2>Failed</h2><p id="failed">0</p></div>
</div>

<div class="container">

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Checkout</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

  <div class="feed">
    <h3>🔴 Live Feed</h3>
    <div id="feedBox"></div>
  </div>

</div>

<audio id="alertSound">
  <source src="assets/mpesa.mp3" type="audio/mpeg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyD6CTXy_YMZniq3CLBcdO_rEtRn1AOyySE",
  authDomain: "harambeeflow.firebaseapp.com",
  projectId: "harambeeflow"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@harambeeflow.com";
let seen = new Set();

onAuthStateChanged(auth, (user) => {
  if (!user || user.email !== ADMIN_EMAIL) {
    window.location.href = "login.html";
  } else {
    start();
  }
});

window.logout = () => signOut(auth);

function toast(msg){
  const d = document.createElement("div");
  d.className = "toast";
  d.innerText = msg;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),3000);
}

function safeTime(d){
  if (!d?.createdAt) return "Pending...";

  if (d.createdAt._seconds) {
    return new Date(d.createdAt._seconds * 1000).toLocaleString();
  }

  return new Date(d.createdAt).toLocaleString();
}

function start(){

  const ref = collection(db,"donations");

  onSnapshot(ref,(snap)=>{

    let total=0, completed=0, pending=0, failed=0;

    const table = document.getElementById("table");
    const feed = document.getElementById("feedBox");

    table.innerHTML="";
    feed.innerHTML="";

    snap.forEach(doc=>{

      const d = doc.data();

      total += Number(d.amount||0);

      if(d.status==="completed") completed++;
      else if(d.status==="pending") pending++;
      else failed++;

      if(!seen.has(doc.id)){
        seen.add(doc.id);
        toast(`💰 ${d.name||"Anonymous"} donated KES ${d.amount}`);
      }

      table.innerHTML += `
        <tr>
          <td>${d.name||"Anonymous"}</td>
          <td>${d.phone||""}</td>
          <td>${d.amount||0}</td>
          <td><span class="status ${d.status}">${d.status}</span></td>
          <td>${d.checkoutRequestID||""}</td>
          <td>${safeTime(d)}</td>
        </tr>
      `;

      const msg = document.createElement("div");
      msg.className="msg";
      msg.innerHTML = `
        <b>${d.name||"Anonymous"}</b><br>
        Donated <span style="color:#22c55e">KES ${d.amount||0}</span>
      `;

      feed.prepend(msg);
    });

    document.getElementById("total").innerText="KES "+total;
    document.getElementById("completed").innerText=completed;
    document.getElementById("pending").innerText=pending;
    document.getElementById("failed").innerText=failed;
  });
}

</script>

</body>
</html>
