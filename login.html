<!DOCTYPE html>
<html>
<head>
  <title>HarambeeFlow Login</title>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:#1f2937;
      padding:30px;
      border-radius:10px;
      width:300px;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:15px;
      border:none;
      background:#2563eb;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 HarambeeFlow Admin</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="error"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD6CTXy_YMZniq3CLBcdO_rEtRn1AOyySE",
  authDomain: "harambeeflow.firebaseapp.com",
  projectId: "harambeeflow",
  storageBucket: "harambeeflow.firebasestorage.app",
  messagingSenderId: "991042439020",
  appId: "1:991042439020:web:f31c474633b26c52121549",
  measurementId: "G-X131DGXWVJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    await signInWithEmailAndPassword(auth, email, password);

    window.location.href = "dashboard-production.html";

  } catch (error) {

    document.getElementById("error").innerText =
      "Login failed";

  }
}

</script>

</body>
</html>
